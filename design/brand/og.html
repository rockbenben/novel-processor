<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap');
  :root { --bg:#15171C; --ink:#ECEAE3; --muted:#9AA1AB; --line:#2A2F38;
    --amber:#E0A050; --amber-t:#F0C088; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1200px; height:630px; }
  body { background:var(--bg); color:var(--ink); display:flex; overflow:hidden;
    position:relative; font-family:'Schibsted Grotesk',system-ui,sans-serif; }
  body::before { content:""; position:absolute; inset:0;
    background:radial-gradient(900px 520px at 86% 30%, rgba(217,136,59,.12), transparent 60%); }
  .left { flex:1; padding:60px 36px 56px 78px; display:flex; flex-direction:column;
    justify-content:center; gap:24px; position:relative; z-index:1; }
  .eyebrow { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:500;
    letter-spacing:.26em; text-transform:uppercase; color:var(--muted);
    display:flex; align-items:center; gap:13px; }
  .eyebrow .bk { width:18px; height:14px; border-radius:3px; border:2px solid var(--amber);
    position:relative; display:inline-block; }
  .eyebrow .bk::after { content:""; position:absolute; left:50%; top:1px; bottom:1px;
    width:2px; background:var(--amber); transform:translateX(-50%); }
  .title { font-weight:800; font-size:80px; line-height:1.0; letter-spacing:-.035em; }
  .title .hl { color:var(--amber); }
  .pills { display:flex; gap:12px; margin-top:2px; }
  .pill { display:flex; align-items:center; gap:9px; padding:11px 20px;
    border:1px solid rgba(224,160,80,.30); background:rgba(224,160,80,.08);
    border-radius:999px; font-size:21px; font-weight:700; color:var(--amber-t); }
  .pill .dot { width:8px; height:8px; border-radius:50%; background:var(--amber); }
  .desc { font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--muted);
    line-height:1.6; max-width:42ch; }
  .url { font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:500;
    color:var(--ink); display:flex; align-items:center; gap:12px; margin-top:2px; }
  .url::before { content:""; width:26px; height:2px; background:var(--amber); }

  .right { width:486px; flex:none; display:flex; align-items:center;
    padding-right:64px; position:relative; z-index:1; }
  .page { width:100%; border-radius:14px; padding:40px 42px 44px;
    background:#F4EEE1; color:#3a342b; position:relative;
    box-shadow:0 40px 80px -30px rgba(0,0,0,.7);
    border-top:6px solid #E0A050; }
  .page .ch { font-family:'Noto Serif SC','Georgia',serif; font-weight:700;
    font-size:30px; color:#9C5A1E; margin-bottom:22px; }
  .page .ln { height:13px; border-radius:6px; background:#d9cfbd; margin:15px 0; }
  .page .ln.w1{width:100%}.page .ln.w2{width:94%}.page .ln.w3{width:88%}.page .ln.w4{width:54%}
  .page .ch2 { font-family:'Noto Serif SC','Georgia',serif; font-weight:700;
    font-size:30px; color:#9C5A1E; margin:30px 0 22px; }
</style>
</head>
<body>
  <div class="left">
    <div class="eyebrow"><span class="bk"></span> Tools&nbsp;By&nbsp;AI · Novel&nbsp;Processor</div>
    <div class="title">Messy text in,<br><span class="hl">a clean book</span> out</div>
    <div class="pills">
      <span class="pill"><span class="dot"></span>Free</span>
      <span class="pill"><span class="dot"></span>No signup</span>
      <span class="pill"><span class="dot"></span>In&#8209;browser</span>
    </div>
    <div class="desc">Fix line breaks · remove ads · auto-sort chapters · simplified⇄traditional. One paste, one click.</div>
    <div class="url">tools.newzone.top</div>
  </div>
  <div class="right">
    <div class="page">
      <div class="ch">第一章 · 启程</div>
      <div class="ln w1"></div><div class="ln w2"></div><div class="ln w3"></div><div class="ln w4"></div>
      <div class="ch2">第二章 · 远方</div>
      <div class="ln w2"></div><div class="ln w1"></div>
    </div>
  </div>
</body>
</html>
